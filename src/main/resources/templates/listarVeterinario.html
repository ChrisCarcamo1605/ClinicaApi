<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tabla con Thymeleaf y Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2 class="mb-4">Lista de Datos</h2>
    <table class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Especialidad</th>
            <th>Correo</th>
            <th>Telefono</th>

        </tr>
        </thead>
        <tbody>
        <!-- Iteración sobre una lista de objetos -->
        <tr th:each="veterinario : ${veterinarios}">
            <td th:text="${veterinario.id()}"></td>
            <td th:text="${veterinario.nombre()}"></td>
            <td th:text="${veterinario.especialidad}"></td>
            <td th:text="${veterinario.correo}"></td>
            <td th:text="${veterinario.telefono}"></td>
            <td>
                <a th:href="@{/editar/{id}(id=${veterinario.id})}" class="btn btn-primary btn-sm">Editar</a>
                <a th:href="@{/eliminar/{id}(id=${veterinario.id})}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(individuos)}">
            <td colspan="5" class="text-center">No hay datos disponibles.</td>
        </tr>
        </tbody>
    </table>
</div>

<!-- JS de Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración de Veterinarios</title>

    <!-- Carga de archivo CSS personalizado -->
    <link rel="stylesheet" th:href="@{/css/Administrador.css}">
</head>
<body>

<!-- Header -->
<header>
    <!-- Enlaces alineados a la extrema derecha -->
    <div class="header-links">
        <a href="/veterinario" class="btn">Veterinarios</a>
        <a href="/veterinario/crear" class="btn btn-crear">Crear Veterinario</a>
    </div>
</header>

<!-- Tabla de Veterinarios -->
<div class="container mt-4">
    <table class="tabla">
        <thead class="tabla-cabecera">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Especialidad</th>
            <th>Correo</th>
            <th>Teléfono</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <!-- Iteración sobre la lista de veterinarios -->
        <tr th:each="veterinario : ${veterinarios}">
            <td th:text="${veterinario.id}"></td>
            <td th:text="${veterinario.nombre}"></td>
            <td th:text="${veterinario.especialidad}"></td>
            <td th:text="${veterinario.correo}"></td>
            <td th:text="${veterinario.telefono}"></td>
            <td>
                <a th:href="@{/veterinario/editar/{id}(id=${veterinario.id})}" class="btn btn-editar">Editar</a>
                <a th:href="@{/veterinario/eliminar/{id}(id=${veterinario.id})}" class="btn btn-eliminar">Eliminar</a>
            </td>
        </tr>

        <!-- Mensaje si no hay datos -->
        <tr th:if="${#lists.isEmpty(veterinarios)}">
            <td colspan="6" class="text-center">No hay datos disponibles.</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>

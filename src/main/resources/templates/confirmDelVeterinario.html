<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Eliminación</title>
    <link rel="stylesheet" href="/css/Administrador.css">
</head>
<body>

<!-- Formulario para confirmar la eliminación de un veterinario -->
<div class="agendar-registrar">
    <div class="form-item">
        <h2>¿Estás seguro de que deseas eliminar este veterinario?</h2>

        <!-- Mostrar datos del veterinario a eliminar -->
        <div>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" th:value="${veterinario.nombre}" readonly>
        </div>

        <div>
            <label for="correo">Correo:</label>
            <input type="email" id="correo" name="correo" th:value="${veterinario.correo}" readonly>
        </div>

        <div>
            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono" th:value="${veterinario.telefono}" readonly>
        </div>

        <div>
            <label for="especialidad">Especialidad:</label>
            <input type="text" id="especialidad" name="especialidad" th:value="${veterinario.especialidad}" readonly>
        </div>

        <div>
            <label for="calle">Calle:</label>
            <input type="text" id="calle" name="direccion.calle" th:value="${veterinario.direccion.calle}" readonly>
        </div>

        <div>
            <label for="ciudad">Ciudad:</label>
            <input type="text" id="ciudad" name="direccion.ciudad" th:value="${veterinario.direccion.ciudad}" readonly>
        </div>

        <div>
            <label for="colonia">Colonia:</label>
            <input type="text" id="colonia" name="direccion.colonia" th:value="${veterinario.direccion.colonia}" readonly>
        </div>

        <!-- Formulario para confirmar la eliminación -->
        <form action="/veterinario/eliminar/{id}" method="post">
            <input type="hidden" name="id" th:value="${veterinario.id}">
            <button type="submit" class="btn btn-eliminar">Eliminar</button>
        </form>

        <a href="/veterinario">Cancelar</a>
    </div>
</div>

</body>
</html>
